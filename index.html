<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathe-Trainer: Extremstellen Profi</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; max-width: 1100px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        .container { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a5276; text-align: center; border-bottom: 4px solid #1a5276; padding-bottom: 10px; }
        .level-selector { text-align: center; margin-bottom: 20px; }
        .level-btn { padding: 10px 20px; margin: 0 5px; border: 2px solid #1a5276; background: white; color: #1a5276; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .level-btn.active { background: #1a5276; color: white; }
        .task-box { font-size: 1.8em; background: #fff; padding: 30px; border-radius: 10px; text-align: center; margin: 20px 0; border: 2px solid #1a5276; min-height: 1.5em; }
        .controls { text-align: center; margin: 20px 0; }
        button.action-btn { background: #2c3e50; color: white; border: none; padding: 12px 28px; font-size: 1.1em; border-radius: 6px; cursor: pointer; margin: 5px; }
        .solution-section { display: none; margin-top: 30px; padding: 20px; border-top: 2px dashed #bdc3c7; background: #fff; }
        .step { font-weight: bold; color: #1a5276; margin-top: 25px; border-left: 5px solid #1a5276; padding-left: 10px; }
        .table-wrapper { margin: 25px 0; overflow-x: auto; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Analysis: Extremstellen Trainer</h1>
    
    <div class="level-selector">
        <button class="level-btn active" id="btnL1" onclick="setLevel(1)">Level 1 (h linear)</button>
        <button class="level-btn" id="btnL2" onclick="setLevel(2)">Level 2 (h quadratisch)</button>
    </div>

    <div id="task" class="task-box">$$
...
$$</div>

    <div class="controls">
        <button class="action-btn" onclick="generateTask()">Neue Aufgabe</button>
        <button class="action-btn" id="toggleBtn" onclick="toggleSolution()" style="background-color: #7f8c8d;">Lösung anzeigen</button>
    </div>

    <div id="solution" class="solution-section">
        <div class="step">1. Erste Ableitung:</div>
        <div id="deriv-step"></div>
        <div class="step">2. Faktorisierte Form:</div>
        <div id="factored-step"></div>
        <div class="step">3. Nullstellen von \( f'(x) \):</div>
        <div id="zeros-step"></div>
        <div class="step">4. Vorzeichentabelle (VZT):</div>
        <div class="table-wrapper" id="latex-table"></div>
        <div class="step">5. Ergebnis:</div>
        <div id="result-step"></div>
    </div>
</div>

<script>
    let currentLevel = 1, currentData = {};

    function setLevel(l) {
        currentLevel = l;
        document.getElementById('btnL1').classList.toggle('active', l === 1);
        document.getElementById('btnL2').classList.toggle('active', l === 2);
        generateTask();
    }

    function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function cleanMath(str) {
        return str.replace(/--/g, "+").replace(/\+-/g, "-").replace(/-\+/g, "-")
            .replace(/\{1\}x/g, "{x}").replace(/\{-1\}x/g, "{-x}")
            .replace(/([^\d])1x/g, "$1x").replace(/^1x/g, "x")
            .replace(/\\cdot 1(?!\d)/g, "").replace(/\\cdot\s*([\+\-])/g, "\\cdot ($1")
            .replace(/\\cdot\s*\(/g, "\\cdot (");
    }

    function formatPoly(a, b, c) {
        let terms = [];
        if (a !== 0) terms.push((a === 1 ? "" : (a === -1 ? "-" : a)) + "x^2");
        if (b !== 0) terms.push((b > 0 ? "+" : "") + (b === 1 ? "" : (b === -1 ? "-" : b)) + "x");
        if (c !== 0) terms.push((c > 0 ? "+" : "") + c);
        let res = terms.join("");
        if (res.startsWith("+")) res = res.substring(1);
        return res || "0";
    }

    function formatLinearFactor(x0) {
        return x0 === 0 ? "x" : (x0 < 0 ? `(x + ${Math.abs(x0)})` : `(x - ${x0})`);
    }

    function generateTask() {
        document.getElementById('solution').style.display = 'none';
        document.getElementById('toggleBtn').innerText = "Lösung anzeigen";
        
        if (currentLevel === 1) {
            let x1 = getRandomInt(-4, 0), x2 = x1 + getRandomInt(1, 4), k = getRandomInt(0, 1) === 0 ? 1 : -1, p = getRandomInt(0, 1) === 0 ? 1 : -1;
            let a = k/p, b = ((-k*(x1+x2)) - 2*a)/p, c = ((k*x1*x2) - b)/p;
            currentData = { a, b, c, p, q: getRandomInt(-2, 2), roots: [x1, x2], k, isLevel2: false };
        } else {
            let z = [2, 3][getRandomInt(0, 1)];
            currentData = { a: 1, b: 0, c: (z*z - 4), p: -0.5, q: getRandomInt(-2, 2), roots: [-z, 0, z], k: -1, isLevel2: true };
        }
        
        const d = currentData;
        const hTex = d.isLevel2 ? formatPoly(d.p, 0, d.q) : formatPoly(0, d.p, d.q);
        document.getElementById('task').innerHTML = `$$
f(x) = (${formatPoly(d.a, d.b, d.c)}) \\cdot e^{${hTex}}
$$`;
        renderSolution();
        if (window.MathJax) MathJax.typesetPromise();
    }

    function renderSolution() {
        const d = currentData, r = d.roots, expT = `e^{${d.isLevel2 ? formatPoly(d.p, 0, d.q) : formatPoly(0, d.p, d.q)}}`;
        const plus = "\\color{green}{+}", minus = "\\color{red}{-}", vK = d.k > 0 ? plus : minus;

        document.getElementById('deriv-step').innerHTML = `$$
f'(x) = ${d.isLevel2 ? `(2x) \\cdot ${expT} + (${formatPoly(d.a, 0, d.c)}) \\cdot ${expT} \\cdot (-x)` : `(${formatPoly(0, 2*d.a, d.b)}) \\cdot ${expT} + (${formatPoly(d.a, d.b, d.c)}) \\cdot ${expT} \\cdot (${d.p})`}
$$`;
        document.getElementById('factored-step').innerHTML = `$$
f'(x) = ${expT} \\cdot [ ${d.isLevel2 ? `-x^3 + ${r[2]*r[2]}x` : formatPoly(d.k, d.k*-(r[0]+r[1]), d.k*r[0]*r[1])} ] = ${expT} \\cdot [ ${d.k < 0 ? "-" : ""}${r.map(formatLinearFactor).join(" \\cdot ")} ]
$$`;
        document.getElementById('zeros-step').innerHTML = `$$
f'(x) = 0 \\iff ${r.map((rt, i) => `x_${i+1} = ${rt}`).join(", ")}
$$`;

        let latex = `$$
\\begin{array}{c|c|`;
        for(let i=0; i<r.length*2 + 1; i++) latex += "c|";
        latex += `c} x & -\\infty & -\\infty < x < ${r[0]} & ${r[0]} `;
        for(let i=0; i<r.length-1; i++) latex += ` & ${r[i]} < x < ${r[i+1]} & ${r[i+1]} `;
        latex += ` & ${r[r.length-1]} < x < \\infty & +\\infty \\\\ \\hline `;

        const fillRow = (label, signFunc) => {
            let row = label + ` & ${signFunc(r[0]-10)} `; 
            row += ` & ${signFunc(r[0]-0.5)} & ${signFunc(r[0])} `; 
            for(let i=0; i<r.length-1; i++) {
                row += ` & ${signFunc((r[i]+r[i+1])/2)} & ${signFunc(r[i+1])} `;
            }
            row += ` & ${signFunc(r[r.length-1]+0.5)} & ${signFunc(r[r.length-1]+10)} \\\\ `;
            return row;
        };

        latex += fillRow(expT, () => plus);
        latex += fillRow(`${d.k}`, () => vK);
        r.forEach(rt => {
            latex += fillRow(formatLinearFactor(rt), (x) => x < rt ? minus : (x === rt ? "0" : plus));
        });

        latex += ` \\hline f'(x) `;
        const getTotSign = (x) => {
            let val = d.k; r.forEach(rt => val *= (x-rt));
            return val > 0 ? plus : (val < 0 ? minus : "0");
        };
        latex += ` & ${getTotSign(r[0]-10)} & ${getTotSign(r[0]-0.5)} & 0 `;
        for(let i=0; i<r.length-1; i++) latex += ` & ${getTotSign((r[i]+r[i+1])/2)} & 0 `;
        latex += ` & ${getTotSign(r[r.length-1]+0.5)} & ${getTotSign(r[r.length-1]+10)} \\\\ \\hline G_f & `;

        let results = [];
        latex += ` & ${getTotSign(r[0]-0.5) === plus ? "\\nearrow" : "\\searrow"} `;
        r.forEach(rt => {
            let type = getTotSign(rt-0.1) === plus ? "HP" : "TP";
            results.push(`<b>${type} bei x = ${rt}</b>`);
            latex += ` & \\text{${type}} & ${getTotSign(rt+0.1) === plus ? "\\nearrow" : "\\searrow"} `;
        });

        latex += ` & \\end{array}
$$`;
        document.getElementById('latex-table').innerHTML = cleanMath(latex);
        document.getElementById('result-step').innerHTML = results.join(", ");
    }

    function toggleSolution() {
        const sol = document.getElementById('solution');
        sol.style.display = (sol.style.display === 'none' || sol.style.display === '') ? 'block' : 'none';
        document.getElementById('toggleBtn').innerText = sol.style.display === 'block' ? "Lösung verbergen" : "Lösung anzeigen";
        if (sol.style.display === 'block') MathJax.typesetPromise();
    }

    window.onload = () => {
        if (window.MathJax) MathJax.startup.promise.then(generateTask);
        else setTimeout(generateTask, 1000);
    };
</script>
</body>
</html>
